<script>
// 1. Rehefa misokatra ny pejy: jerena raha efa "dark" ny tany aloha
if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('dark-btn').innerText = '☀️ Mode Jour';
}

// 2. Rehefa tsindrina ilay bokotra
function toggleDarkMode() {
    const body = document.body;
    const btn = document.getElementById('dark-btn');
    
    body.classList.toggle('dark-mode');
    
    // Tahirizina ao anaty navigateur ny safidy mba ho tsaroany isaky ny pejy
    if (body.classList.contains('dark-mode')) {
        btn.innerText = '☀️ Mode Jour';
        localStorage.setItem('theme', 'dark');
    } else {
        btn.innerText = '🌙 Mode Nuit';
        localStorage.setItem('theme', 'light');
    }
}
</script>
